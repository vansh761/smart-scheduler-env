spec_version: 1
name: smart_schedule_env
version: "0.1.0"
description: >
  AI environment for real-world task scheduling, conflict resolution, and optimization.

type: space
runtime: fastapi
app: hackathon_2.server.app:app
port: 8000

tasks:
  - name: easy
    id: easy
    difficulty: easy
    description: Sort tasks by priority with no scheduling conflicts.
    max_steps: 3
    # Scores must be strictly between 0 and 1 for validation
    score_range: [0.01, 0.99]
    grader:
      type: python
      entrypoint: hackathon_2.grader.grade_easy

  - name: medium
    id: medium
    difficulty: medium
    description: Resolve scheduling conflicts while preserving task importance.
    max_steps: 3
    # Scores must be strictly between 0 and 1 for validation
    score_range: [0.01, 0.99]
    grader:
      type: python
      entrypoint: hackathon_2.grader.grade_medium

  - name: hard
    id: hard
    difficulty: hard
    description: Optimize a full schedule under multiple constraints with partial credit.
    max_steps: 3
    # Scores must be strictly between 0 and 1 for validation
    score_range: [0.01, 0.99]
    grader:
      type: python
      entrypoint: hackathon_2.grader.grade_hard

observation_space:
  type: Hackathon2Observation
  fields:
    message: string
    tasks: list
    conflicts: list
    scheduled: list
    reward: float
    done: bool

action_space:
  type: Hackathon2Action
  fields:
    task_id: int
    start_time: int
    action_type: string

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
